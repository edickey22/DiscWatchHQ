<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ── Affiliate / domain verification ─────────────────────────────── -->
    <meta name='impact-site-verification' value='3e3bce1d-fbe7-4070-9d7d-89ad00275281'>

    <!-- ── Primary meta ──────────────────────────────────────────────────── -->
    <title>DiscWatchHQ — Find Any Game, Buy Anywhere</title>
    <meta name="description" content="Search 900,000+ physical games across every platform and generation. Jump straight to GameStop, Amazon, eBay, and Best Buy — plus real-time boutique limited-run drop tracking." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#21b557" />

    <!-- ── Open Graph (Facebook, Discord, Slack, LinkedIn …) ────────────── -->
    <meta property="og:site_name"   content="DiscWatchHQ" />
    <meta property="og:type"        content="website" />
    <!-- og:url defaults to root; useDocumentHead overrides it dynamically per page -->
    <meta property="og:url"         content="https://discwatchhq.com/" />
    <meta property="og:title"       content="DiscWatchHQ — Find Any Game, Buy Anywhere" />
    <meta property="og:description" content="Search 900,000+ physical games across every platform. One search, four storefronts — GameStop, Amazon, eBay, Best Buy. Plus boutique limited-run drop tracker." />
    <meta property="og:image"       content="https://raw.githubusercontent.com/edickey22/DiscWatchHQ/main/artifacts/tracker/public/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="DiscWatchHQ — Find Any Game, Buy Anywhere" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="DiscWatchHQ — Find Any Game, Buy Anywhere" />
    <meta name="twitter:description" content="Search 900,000+ physical games across every platform. One search, four storefronts — GameStop, Amazon, eBay, Best Buy. Plus boutique limited-run drop tracker." />
    <meta name="twitter:image"       content="https://raw.githubusercontent.com/edickey22/DiscWatchHQ/main/artifacts/tracker/public/og-image.png" />
    <meta name="twitter:image:alt"   content="DiscWatchHQ — Find Any Game, Buy Anywhere" />

    <!-- ── Favicons ──────────────────────────────────────────────────────── -->
    <!-- SVG: used by modern browsers (Chrome 80+, Firefox, Safari 14+).
         sizes="any" is correct for scalable SVG icons. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <!-- ICO: raster fallback for older browsers; multi-frame (16, 32, 48 px).
         No sizes attribute — the browser picks the best frame from the ICO. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!-- Apple touch icon: used for iOS/iPadOS home screen bookmarks -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── PWA / Web App Manifest ────────────────────────────────────────── -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Google AdSense ───────────────────────────────────────────────── -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5084315305897479" crossorigin="anonymous"></script>

    <!-- ── Google Analytics 4 ───────────────────────────────────────────── -->
    <!-- Loads gtag.js; the SPA route-change listener lives in App.tsx -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S1861HDJE1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S1861HDJE1');
    </script>

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
